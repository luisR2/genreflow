<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenreFlow · BPM Analyzer</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">GenreFlow</p>
      <h1>Analyze BPM with a simple drop</h1>
      <p class="lede">Drag in WAV, FLAC, MP3, or AIFF files. This UI stays public while the FastAPI backend remains protected behind the scenes.</p>
    </header>

    <section class="panel">
      <div id="drop-zone" class="drop-zone" aria-label="Drop audio files to analyze">
        <div class="drop-copy">
          <div class="pill">Drop files</div>
          <h2>Drag &amp; drop audio</h2>
          <p>or</p>
          <button id="browse-button" type="button" class="secondary">Browse files</button>
        </div>
        <input id="file-input" type="file" accept=".wav,.flac,.mp3,.aiff" multiple aria-label="Select audio files">
      </div>

      <div class="selection">
        <div class="selection-header">
          <span id="file-counter">No files selected</span>
          <button id="clear-button" type="button" class="ghost">Clear</button>
        </div>
        <ul id="file-list" class="file-list" aria-live="polite"></ul>
      </div>

      <div class="actions">
        <button id="analyze-button" type="button" class="primary">Analyze</button>
        <span id="status" class="status" role="status" aria-live="polite"></span>
      </div>
    </section>

    <section id="results-panel" class="panel hidden">
      <div class="results-header">
        <div>
          <p class="eyebrow">Results</p>
          <h3>Predicted tempo</h3>
        </div>
        <div class="chip" id="total-time">Total: –</div>
      </div>
      <table class="results-table">
        <thead>
          <tr>
            <th>File</th>
            <th>BPM</th>
            <th>Analysis time</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </section>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
