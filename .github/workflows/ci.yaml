name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/genreflow-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.3'

      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Lint and format (ruff)
        run: |
          poetry run ruff check .                   
          poetry run ruff format --check . 
          
      - name: Type check (mypy)
        run: poetry run mypy server model || true  # relax early on

      - name: Run tests
        run: poetry run pytest -q

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t "$IMAGE_NAME:$IMAGE_TAG" -f docker/Dockerfile .
          # Also tag as latest for dev branch
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          # Push latest tag if on dev branch
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker push "$IMAGE_NAME:latest"
          fi

  # Optional: static security scan placeholder
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
