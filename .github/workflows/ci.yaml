name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      BE_IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/genreflow-backend
      FE_IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/genreflow-frontend
      PYTHONPATH: ..
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.3'

      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Lint and format (ruff)
        run: |
          poetry run ruff check .
          poetry run ruff format --check .
          
      - name: Type check (mypy)
        run: poetry run mypy backend || true  # relax early on

      - name: Run tests
        run: poetry run pytest -q

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend (arm64)
        working-directory: .
        run: |
          EXTRA_TAGS=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            EXTRA_TAGS="-t $BE_IMAGE_NAME:latest"
          fi

          docker buildx build --platform linux/arm64 \
            -t "$BE_IMAGE_NAME:$IMAGE_TAG" \
            $EXTRA_TAGS \
            -f backend/Dockerfile \
            --push \
            .

      - name: Build and push frontend (arm64)
        working-directory: .
        run: |
          EXTRA_TAGS=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            EXTRA_TAGS="-t $FE_IMAGE_NAME:latest"
          fi

          docker buildx build --platform linux/arm64 \
            -t "$FE_IMAGE_NAME:$IMAGE_TAG" \
            $EXTRA_TAGS \
            -f frontend/Dockerfile \
            --push \
            .

  # Optional: static security scan placeholder
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
