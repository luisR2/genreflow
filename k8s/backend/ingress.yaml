apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: genreflow
  namespace: genreflow-backend
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: genreflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: genreflow
                port:
                  number: 80
