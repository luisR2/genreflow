apiVersion: apps/v1
kind: Deployment
metadata:
  name: genreflow-frontend
  namespace: genreflow-frontend
  labels:
    app.kubernetes.io/name: genreflow
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: genreflow
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: genreflow
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: genreflow
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: genreflow
    spec:
      serviceAccountName: genreflow-frontend
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: genreflow-frontend
          image: luisrr/genreflow-frontend:latest
          imagePullPolicy: Always
          env:
            - name: GENREFLOW_API_BASE_URL
              value: http://genreflow.local
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              # TODO: adjust limits based on the workload
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
